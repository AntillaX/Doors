# Add this `location` block to /etc/nginx/sites-available/vv inside
# the existing `server { ... }` block, alongside /platform/, /auction/,
# /acdc/, and /level0/.
#
# Trailing slash on proxy_pass strips the /doors/ prefix so the Node
# server sees requests at its own root. The client computes its WebSocket
# URL from location.pathname so it naturally targets /doors/.

# ─── DOORS — Node.js + WebSocket ────────────────────────────────────
location /doors/ {
    proxy_pass http://127.0.0.1:3400/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}
