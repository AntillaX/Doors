<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050508">
  <title>DOORS</title>
  <link rel="stylesheet" href="style.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S648R7WPGJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S648R7WPGJ', { send_page_view: false });
  </script>
</head>
<body>
<div id="app">

  <!-- ── Landing ─────────────────────────────────────────────── -->
  <section id="landing-screen" class="screen active">
    <a href="/" class="btn-home">&larr; Hub</a>
    <div class="landing-inner">
      <header class="landing-header">
        <h1 class="game-title">DOORS</h1>
        <p class="game-subtitle">Solve. Vote. Deliver.</p>
      </header>
      <form id="landing-form" class="form-stack" autocomplete="off">
        <input type="text" id="player-name-input" class="input" placeholder="Your name"
               maxlength="16" autocomplete="off" spellcheck="false" required>
        <button type="button" id="create-btn" class="btn btn-primary">Create Game</button>
        <div class="divider"><span>or join a game</span></div>
        <div class="join-row">
          <input type="text" id="room-code-input" class="input input-code" placeholder="CODE"
                 maxlength="4" autocomplete="off" spellcheck="false">
          <button type="button" id="join-btn" class="btn btn-secondary">Join</button>
        </div>
      </form>
      <p id="landing-error" class="error-text" aria-live="polite"></p>
    </div>
  </section>

  <!-- ── Lobby ───────────────────────────────────────────────── -->
  <section id="lobby-screen" class="screen">
    <button id="lobby-leave-btn" class="btn-home">&larr; Leave</button>
    <div class="lobby-inner">
      <p class="label-small">Room code &middot; tap to copy</p>
      <button id="room-code-display" class="room-code-btn" type="button" aria-label="Copy room code"></button>
      <ul id="lobby-players" class="lobby-players" aria-label="Players in lobby"></ul>
      <p id="lobby-hint" class="muted-text">Waiting for players&hellip;</p>
      <button id="start-btn" class="btn btn-primary" disabled>Start Game</button>
    </div>
  </section>

  <!-- ── Game ────────────────────────────────────────────────── -->
  <section id="game-screen" class="screen">

    <!-- Top: 5-player bar -->
    <div id="player-bar" role="list" aria-label="Players"></div>

    <!-- Room numeral (appears briefly when entering each room) -->
    <div id="room-numeral" class="room-numeral" aria-hidden="true"></div>

    <!-- Main content area -->
    <div id="game-area">

      <!-- Puzzle wrap — this is what "opens" like doors on room clear -->
      <div id="puzzle-wrap">
        <div class="door-half door-left" aria-hidden="true"></div>
        <div class="door-half door-right" aria-hidden="true"></div>
        <div id="puzzle-content">
          <!-- Flash sequence words/numbers appear here -->
          <div id="flash-display" class="flash-display" aria-live="assertive"></div>
          <!-- Static stimulus text -->
          <p id="stimulus-text" class="stimulus-text"></p>
          <!-- Question -->
          <p id="question-text" class="question-text"></p>
        </div>
      </div>

      <!-- Vote area (room_vote phase) -->
      <div id="vote-area" class="vote-area" hidden aria-label="Vote for deliverer">
        <p class="vote-hint">Vote who delivers the answer</p>
        <div id="vote-buttons" class="vote-buttons"></div>
      </div>

      <!-- Deliver area (room_deliver phase) -->
      <div id="deliver-area" class="deliver-area" hidden>
        <p id="deliverer-label" class="deliverer-label"></p>

        <!-- Text / numeric answer input (deliverer sees this) -->
        <div id="text-input-wrap" class="text-input-wrap" hidden>
          <input type="text" id="answer-input" class="answer-input"
                 autocomplete="off" spellcheck="false" maxlength="100"
                 aria-label="Your answer">
          <button type="button" id="submit-btn" class="btn btn-primary">Submit</button>
        </div>

        <!-- Live answer mirror (non-deliverers see this) -->
        <p id="live-answer" class="live-answer" hidden aria-live="polite"></p>

        <!-- Choice options (deliverer sees this for MCQ) -->
        <div id="choice-options" class="choice-options" hidden></div>
      </div>

      <!-- Transient resolve feedback (correct/wrong flash) -->
      <div id="resolve-msg" class="resolve-msg" hidden aria-live="polite"></div>

      <!-- Disconnect countdown notices -->
      <div id="disconnect-notices" class="disconnect-notices" aria-live="polite"></div>

    </div><!-- /#game-area -->

    <!-- Bottom: progress + timer -->
    <div id="bottom-bar">
      <div id="progress-indicator" aria-label="Room progress">
        <!-- 10 marks built by JS -->
      </div>
      <div id="game-timer" class="game-timer" aria-label="Time remaining">30:00</div>
    </div>

  </section><!-- /#game-screen -->

  <!-- ── Game Over ────────────────────────────────────────────── -->
  <section id="gameover-screen" class="screen">
    <div class="over-inner">
      <h2 id="over-title" class="over-title"></h2>
      <p id="over-subtitle" class="over-subtitle"></p>
      <div id="over-summary" class="over-summary" role="list"></div>
      <button id="play-again-btn" class="btn btn-primary" hidden>Play Again</button>
      <a href="/" class="btn btn-ghost over-hub-link">&larr; Hub</a>
    </div>
  </section>

  <!-- Toast -->
  <div id="toast" class="toast" hidden aria-live="assertive"></div>

</div><!-- /#app -->
<script src="app.js"></script>
</body>
</html>
